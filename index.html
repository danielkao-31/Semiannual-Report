<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>半年度訓練夜間班人數回報系統</title>

<style>
  :root{
    --cream:#f6efe3;
    --cream2:#eadfcd;
    --text:#4b3424;
    --text2:#342419;
    --muted:#897866;

    --green:#8ea566;
    --green2:#b8c99a;
    --greenDark:#71884f;
    --teal:#6c9690;
    --brown:#6b452d;
    --danger:#c94f43;

    --line:rgba(80,55,35,.14);
    --whiteLine:rgba(255,255,255,.62);

    --shadow:0 18px 54px rgba(65,43,25,.12);
    --shadow2:0 10px 28px rgba(65,43,25,.08);

    --bottomSpace:128px;
    --maxw:980px;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,
  body{
    width:100%;
    min-height:100%;
    margin:0;
    overflow-x:hidden;
  }

  body{
    font-family:
      "Noto Sans TC",
      "PingFang TC",
      "Microsoft JhengHei",
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at -8% 0%, rgba(108,150,144,.30) 0%, transparent 34%),
      radial-gradient(circle at 105% 0%, rgba(142,165,102,.28) 0%, transparent 34%),
      radial-gradient(circle at 100% 100%, rgba(210,160,95,.22) 0%, transparent 40%),
      linear-gradient(135deg,var(--cream),var(--cream2));
    position:relative;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-3;
    pointer-events:none;
    background:
      linear-gradient(128deg, transparent 0%, transparent 43%, rgba(255,255,255,.24) 43%, rgba(255,255,255,.24) 48%, transparent 48%),
      linear-gradient(36deg, transparent 0%, transparent 64%, rgba(142,165,102,.12) 64%, rgba(142,165,102,.12) 72%, transparent 72%),
      linear-gradient(156deg, transparent 0%, transparent 75%, rgba(108,150,144,.12) 75%, rgba(108,150,144,.12) 83%, transparent 83%);
  }

  body::after{
    content:"";
    position:fixed;
    z-index:-2;
    pointer-events:none;
    right:-180px;
    top:-120px;
    width:540px;
    height:540px;
    border-radius:96px;
    transform:rotate(28deg);
    background:linear-gradient(135deg,rgba(142,165,102,.24),rgba(255,255,255,.08));
  }

  .wrap{
    width:min(var(--maxw),100%);
    margin:0 auto;
    padding:28px 24px calc(var(--bottomSpace) + 42px);
  }

  .hero{
    position:relative;
    overflow:hidden;
    border-radius:34px;
    padding:28px;
    background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(255,255,255,.50));
    border:1px solid var(--whiteLine);
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
  }

  .hero::before{
    content:"";
    position:absolute;
    right:-110px;
    top:-120px;
    width:320px;
    height:320px;
    border-radius:66px;
    transform:rotate(30deg);
    background:linear-gradient(135deg,rgba(142,165,102,.27),rgba(255,255,255,.06));
    pointer-events:none;
  }

  .heroInner{
    position:relative;
    z-index:2;
    display:grid;
    grid-template-columns:1fr auto;
    gap:22px;
    align-items:flex-start;
  }

  .brand{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:18px;
    align-items:start;
    min-width:0;
  }

  .logo{
    width:66px;
    height:66px;
    border-radius:24px;
    background:linear-gradient(180deg,var(--teal),var(--green));
    box-shadow:
      0 0 0 12px rgba(108,150,144,.10),
      0 14px 34px rgba(108,150,144,.22);
    position:relative;
    flex:0 0 auto;
  }

  .logo::before{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:19px;
    height:40px;
    border-radius:999px;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,.82);
  }

  h1{
    margin:0;
    color:var(--text2);
    font-size:46px;
    line-height:1.16;
    font-weight:950;
    letter-spacing:.04em;
  }

  .sub{
    margin:12px 0 0;
    color:var(--muted);
    font-size:21px;
    line-height:1.55;
    font-weight:800;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:10px;
    min-height:50px;
    padding:10px 16px;
    border-radius:999px;
    border:1px solid var(--whiteLine);
    background:rgba(255,255,255,.58);
    box-shadow:var(--shadow2);
    color:var(--brown);
    font-size:18px;
    font-weight:950;
    white-space:nowrap;
  }

  .chipDot{
    width:11px;
    height:11px;
    border-radius:999px;
    background:var(--green);
    box-shadow:0 0 0 7px rgba(142,165,102,.16);
  }

  .card{
    margin-top:22px;
    position:relative;
    overflow:hidden;
    border-radius:38px;
    padding:36px;
    background:linear-gradient(145deg,rgba(255,255,255,.82),rgba(255,255,255,.56));
    border:1px solid var(--whiteLine);
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
  }

  .card::before{
    content:none !important;
    display:none !important;
  }

  .card::after{
    content:"";
    position:absolute;
    right:-180px;
    top:120px;
    width:400px;
    height:400px;
    border-radius:78px;
    transform:rotate(32deg);
    background:linear-gradient(135deg,rgba(142,165,102,.14),rgba(255,255,255,0));
    pointer-events:none;
    z-index:0;
  }

  .card > *{
    position:relative;
    z-index:2;
  }

  .card > .sectionTitle{
    display:none !important;
  }

  .sectionTitle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin:0 0 38px;
    padding-left:0;
  }

  .sectionTitleText{
    color:var(--text2);
    font-size:46px;
    line-height:1.12;
    font-weight:950;
    letter-spacing:.05em;
  }

  .sectionBadge{
    display:none !important;
  }

  .q{
    margin-top:38px;
  }

  .q:first-of-type{
    margin-top:0;
  }

  label{
    display:block;
    margin:0 0 16px;
    color:#304d48;
    font-size:31px;
    line-height:1.32;
    font-weight:950;
    letter-spacing:.04em;
  }

  .card > .q:has(#trainingDisplay) > label{
    display:none !important;
  }

  .card > .q:has(#trainingDisplay){
    margin-top:0 !important;
  }

  select,
  input[type="text"],
  input[type="number"],
  input[type="password"]{
    display:block;
    width:100%;
    height:104px;
    min-height:104px;
    border:2px solid var(--line);
    border-radius:30px;
    outline:none;
    padding:0 26px;
    background-color:rgba(255,255,255,.86);
    color:var(--text2);
    font-size:32px;
    font-weight:900;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.88),
      0 14px 32px rgba(65,43,25,.07);
    transition:
      border-color .2s ease,
      box-shadow .2s ease,
      transform .2s ease;
  }

  select{
    appearance:none;
    -webkit-appearance:none;
    text-align:left;
    text-align-last:left;
    padding-right:78px;
    background-image:
      linear-gradient(45deg,transparent 50%,var(--brown) 50%),
      linear-gradient(135deg,var(--brown) 50%,transparent 50%),
      linear-gradient(to bottom,rgba(80,55,35,.16),rgba(80,55,35,.16));
    background-position:
      calc(100% - 44px) 50%,
      calc(100% - 29px) 50%,
      calc(100% - 74px) 50%;
    background-size:
      15px 15px,
      15px 15px,
      1px 48px;
    background-repeat:no-repeat;
  }

  input::placeholder{
    color:rgba(52,36,25,.34);
    font-weight:850;
  }

  select:focus,
  input:focus{
    border-color:rgba(142,165,102,.66);
    box-shadow:
      0 0 0 6px rgba(142,165,102,.16),
      0 18px 40px rgba(65,43,25,.10);
    transform:translateY(-1px);
  }

  .trainBox{
    display:grid;
    grid-template-columns:1fr auto;
    align-items:center;
    gap:18px;
    padding:26px;
    border-radius:32px;
    border:1px solid rgba(80,55,35,.10);
    background:linear-gradient(135deg,rgba(142,165,102,.13),rgba(255,255,255,.58));
    box-shadow:var(--shadow2);
  }

  .trainText{
    min-width:0;
  }

  .trainText .small{
    color:var(--muted);
    font-size:18px;
    line-height:1.3;
    font-weight:950;
    letter-spacing:.06em;
  }

  .trainText .big{
    margin-top:8px;
    color:var(--text2);
    font-size:38px;
    line-height:1.24;
    font-weight:950;
    word-break:break-word;
  }

  .lessonBlock{
    position:relative;
    padding:28px;
    border-radius:32px;
    border:1px solid var(--whiteLine);
    background:linear-gradient(145deg,rgba(255,250,240,.84),rgba(255,255,255,.48));
    box-shadow:0 14px 36px rgba(65,43,25,.075);
  }

  .lessonTitle{
    display:flex;
    align-items:center;
    gap:14px;
    margin:0 0 26px;
    color:var(--text2);
    font-size:45px;
    font-weight:950;
    line-height:1.2;
    letter-spacing:.04em;
  }

  .lessonTitle::before{
    content:"";
    width:15px;
    height:42px;
    border-radius:999px;
    background:linear-gradient(180deg,var(--green),var(--green2));
    box-shadow:0 0 0 9px rgba(142,165,102,.12);
    flex:0 0 auto;
  }

  .numberPair{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
  }

  .btn{
    height:82px;
    min-height:82px;
    border:2px solid rgba(80,55,35,.13);
    border-radius:26px;
    padding:0 30px;
    background:rgba(255,255,255,.76);
    color:var(--brown);
    font-size:27px;
    font-weight:950;
    cursor:pointer;
    box-shadow:0 14px 32px rgba(65,43,25,.08);
    transition:
      transform .2s ease,
      box-shadow .2s ease,
      opacity .2s ease;
    white-space:nowrap;
  }

  .btn:hover{
    transform:translateY(-2px);
    box-shadow:0 20px 42px rgba(65,43,25,.12);
  }

  .btn.primary{
    border-color:rgba(142,165,102,.24);
    background:linear-gradient(135deg,var(--greenDark),var(--green2));
    color:#fff;
  }

  .btn.danger{
    color:var(--danger);
  }

  .btn:disabled{
    opacity:.55;
    cursor:not-allowed;
    transform:none;
  }

  .divider{
    height:1px;
    margin:36px 0;
    background:linear-gradient(to right,transparent,rgba(80,55,35,.15),transparent);
  }

  .sticky{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:20;
    padding:16px 20px calc(16px + env(safe-area-inset-bottom));
    background:rgba(246,239,227,.82);
    border-top:1px solid rgba(255,255,255,.64);
    backdrop-filter:blur(18px);
    box-shadow:0 -18px 46px rgba(65,43,25,.08);
  }

  .stickyInner{
    width:min(var(--maxw),100%);
    margin:0 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  .sticky .btn{
    width:100%;
    height:92px;
    min-height:92px;
    border-radius:30px;
    font-size:28px;
  }

  .sheetMask{
    position:fixed;
    inset:0;
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:rgba(62,43,28,.32);
    backdrop-filter:blur(10px);
  }

  .sheetMask.show{
    display:flex;
  }

  .sheet{
    width:min(920px,100%);
    max-height:92vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border-radius:36px;
    border:1px solid var(--whiteLine);
    background:linear-gradient(145deg,rgba(255,255,255,.94),rgba(255,255,255,.72));
    box-shadow:0 32px 94px rgba(48,32,18,.24);
    backdrop-filter:blur(22px);
  }

  .sheetHeader{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:26px;
    border-bottom:1px solid rgba(80,55,35,.10);
    background:rgba(255,255,255,.34);
  }

  .sheetHeader .t{
    color:var(--text2);
    font-size:32px;
    font-weight:950;
    line-height:1.2;
  }

  .sheetBody{
    flex:1 1 auto;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:28px;
  }

  .hint{
    margin:20px 0 0;
    color:var(--muted);
    font-size:21px;
    line-height:1.7;
    font-weight:800;
  }

  .modalActions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-top:22px;
  }

  .toast{
    position:fixed;
    left:50%;
    top:50%;
    bottom:auto;
    transform:translate(-50%, -50%);
    z-index:9999;
    display:none;
    width:min(88vw,720px);
    padding:42px 34px;
    border-radius:34px;
    background:#fff;
    border:3px solid rgba(143,166,103,.45);
    box-shadow:0 28px 90px rgba(45,30,18,.30);
    backdrop-filter:blur(18px);
  }

  .toast.show{
    display:block;
  }

  .toast.ok{
    border-color:rgba(142,165,102,.45);
  }

  .toast.bad{
    border-color:rgba(201,79,67,.45);
  }

  .toast .msg{
    color:var(--text2);
    font-size:60px;
    line-height:1.25;
    font-weight:950;
    text-align:center;
  }

  @media (max-width:1023px), (hover:none), (pointer:coarse){
    :root{
      --bottomSpace:104px;
      --maxw:none;
    }

    body{
      background:
        radial-gradient(circle at -10% 0%, rgba(108,150,144,.31) 0%, transparent 34%),
        radial-gradient(circle at 112% 0%, rgba(142,165,102,.30) 0%, transparent 36%),
        radial-gradient(circle at 100% 100%, rgba(210,160,95,.22) 0%, transparent 40%),
        linear-gradient(135deg,var(--cream),var(--cream2));
    }

    .wrap{
      width:100%;
      max-width:none;
      padding:8px 8px calc(var(--bottomSpace) + 26px);
    }

    .hero{
      display:block;
      padding:18px 16px;
      border-radius:26px;
    }

    .heroInner{
      grid-template-columns:1fr;
      gap:14px;
    }

    .brand{
      grid-template-columns:auto 1fr;
      gap:12px;
    }

    .logo{
      width:48px;
      height:48px;
      border-radius:18px;
      box-shadow:
        0 0 0 8px rgba(108,150,144,.10),
        0 10px 24px rgba(108,150,144,.20);
    }

    .logo::before{
      width:14px;
      height:28px;
    }

    h1{
      font-size:31px;
      line-height:1.18;
      letter-spacing:.02em;
    }

    .sub{
      margin-top:8px;
      font-size:18px;
      line-height:1.5;
    }

    .chip{
      width:max-content;
      min-height:40px;
      padding:8px 14px;
      font-size:17px;
    }

    .card{
      margin-top:10px;
      padding:28px 14px 30px;
      border-radius:28px;
      background:linear-gradient(145deg,rgba(255,255,255,.82),rgba(255,255,255,.56));
      backdrop-filter:blur(18px);
    }

    .card::before{
      content:none !important;
      display:none !important;
    }

    .card::after{
      content:"";
      display:block;
      right:-220px;
      top:150px;
      width:360px;
      height:360px;
    }

    .card > .sectionTitle{
      display:none !important;
    }

    .q{
      margin-top:30px;
    }

    label{
      margin:0 0 12px;
      font-size:32px;
      line-height:1.25;
    }

    .card > .q:has(#trainingDisplay) > label{
      display:none !important;
    }

    .card > .q:has(#trainingDisplay){
      margin-top:0 !important;
    }

    select,
    input[type="text"],
    input[type="number"],
    input[type="password"]{
      height:82px;
      min-height:82px;
      border-radius:22px;
      border-width:2px;
      padding:0 62px 0 20px;
      font-size:30px;
      line-height:1.15;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.88),
        0 10px 24px rgba(65,43,25,.07);
    }

    select{
      text-align:left;
      text-align-last:left;
      padding-right:62px;
      background-position:
        calc(100% - 36px) 50%,
        calc(100% - 23px) 50%,
        calc(100% - 58px) 50%;
      background-size:
        13px 13px,
        13px 13px,
        1px 38px;
    }

    .trainBox{
      min-height:auto;
      grid-template-columns:1fr;
      gap:14px;
      padding:18px;
      border-radius:24px;
      background:linear-gradient(135deg,rgba(142,165,102,.13),rgba(255,255,255,.58));
    }

    .trainText .small{
      font-size:18px;
    }

    .trainText .big{
      font-size:32px;
      line-height:1.2;
    }

    .trainBox .btn,
    #btnOpenSheet{
      width:100%;
      height:70px;
      min-height:70px;
      font-size:26px;
      border-radius:22px;
    }

    .lessonBlock{
      padding:22px 14px;
      border-radius:26px;
      background:linear-gradient(145deg,rgba(255,250,240,.84),rgba(255,255,255,.48));
      box-shadow:0 14px 36px rgba(65,43,25,.075);
    }

    .lessonTitle{
      margin-bottom:24px;
      font-size:36px;
      line-height:1.2;
    }

    .lessonTitle::before{
      width:13px;
      height:36px;
    }

    .numberPair{
      grid-template-columns:1fr;
      gap:24px;
    }

    .numberPair label{
      font-size:32px;
    }

    .numberPair input{
      height:82px;
      min-height:82px;
      border-radius:22px;
      font-size:30px;
      padding:0 20px;
    }

    .btn{
      height:70px;
      min-height:70px;
      border-radius:22px;
      font-size:26px;
    }

    .divider{
      margin:30px 0;
    }

    .sticky{
      padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    }

    .stickyInner{
      width:100%;
      max-width:none;
      gap:10px;
    }

    .sticky .btn{
      width:100%;
      height:72px;
      min-height:72px;
      border-radius:24px;
      font-size:25px;
    }

    .sheetMask{
      align-items:flex-end;
      padding:8px;
    }

    .sheet{
      max-height:calc(100vh - 16px);
      border-radius:28px;
    }

    .sheetHeader{
      padding:18px;
    }

    .sheetHeader .t{
      font-size:30px;
    }

    .sheetHeader .btn{
      width:auto;
      min-width:112px;
      height:70px;
      min-height:70px;
      font-size:24px;
      border-radius:22px;
    }

    .sheetBody{
      padding:18px 14px 24px;
    }

    .sheetBody .q{
      margin-top:30px;
    }

    .modalActions{
      gap:10px;
    }

    .hint{
      font-size:20px;
    }

    .toast{
      left:50%;
      top:50%;
      bottom:auto;
      transform:translate(-50%, -50%);
      width:min(88vw,720px);
      padding:38px 30px;
      border-radius:30px;
    }

    .toast .msg{
      font-size:54px;
      line-height:1.25;
    }
  }

  @media (max-width:390px){
    h1{
      font-size:29px;
    }

    label,
    .numberPair label{
      font-size:30px;
    }

    select,
    input[type="text"],
    input[type="number"],
    input[type="password"],
    .numberPair input{
      font-size:28px;
    }

    .trainText .big{
      font-size:30px;
    }

    .sticky .btn{
      font-size:24px;
    }
  }

  @media (min-width:1024px) and (hover:hover) and (pointer:fine){
    :root{
      --bottomSpace:112px;
      --maxw:860px;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#efe4d3,#f8f0e5);
    }

    body::before{
      left:-280px;
      bottom:-280px;
      width:560px;
      height:560px;
      border-radius:140px;
      opacity:.72;
      z-index:-5;
    }

    body::after{
      right:-320px;
      top:-320px;
      width:640px;
      height:640px;
      border-radius:160px;
      opacity:.72;
      z-index:-5;
    }

    .wrap{
      max-width:860px;
      padding:34px 28px calc(112px + 36px);
    }

    .hero{
      display:none;
    }

    .card{
      margin:0 auto;
      width:100%;
      max-width:860px;
      border-radius:34px;
      padding:42px 46px 44px;
      background:#fff9ef;
      border:1px solid rgba(255,255,255,.90);
      box-shadow:0 18px 46px rgba(54,35,18,.14);
      backdrop-filter:none;
    }

    .card::before{
      content:none !important;
      display:none !important;
    }

    .card::after{
      content:none;
      display:none;
    }

    .card > .sectionTitle{
      display:none !important;
    }

    .q{
      margin-top:30px;
    }

    label{
      font-size:28px;
      line-height:1.32;
      margin:0 0 12px;
    }

    .card > .q:has(#trainingDisplay) > label{
      display:none !important;
    }

    .card > .q:has(#trainingDisplay){
      margin-top:0 !important;
    }

    select,
    input[type="text"],
    input[type="number"],
    input[type="password"]{
      height:78px;
      min-height:78px;
      border-radius:22px;
      border-width:2px;
      padding:0 64px 0 22px;
      font-size:26px;
      line-height:1.15;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 10px 22px rgba(54,35,18,.10);
    }

    select{
      text-align:left;
      text-align-last:left;
      background-position:
        calc(100% - 38px) 50%,
        calc(100% - 24px) 50%,
        calc(100% - 58px) 50%;
      background-size:
        14px 14px,
        14px 14px,
        1px 38px;
    }

    .trainBox{
      min-height:96px;
      grid-template-columns:1fr auto;
      gap:18px;
      padding:20px 22px;
      border-radius:24px;
      background:#fff;
      box-shadow:0 10px 22px rgba(54,35,18,.10);
    }

    .trainText .small{
      font-size:16px;
      line-height:1.25;
    }

    .trainText .big{
      font-size:28px;
      line-height:1.22;
    }

    .btn{
      width:auto;
      height:72px;
      min-height:72px;
      border-radius:22px;
      border-width:2px;
      padding:0 28px;
      font-size:24px;
      box-shadow:0 10px 22px rgba(54,35,18,.10);
      transform:none;
    }

    #btnOpenSheet{
      width:auto;
    }

    .divider{
      margin:34px 0;
    }

    .lessonBlock{
      padding:26px 28px 28px;
      border-radius:28px;
      background:#fffdf8;
      border:1px solid rgba(255,255,255,.90);
      box-shadow:0 10px 24px rgba(54,35,18,.08);
    }

    .lessonTitle{
      font-size:34px;
      line-height:1.2;
      margin:0 0 24px;
    }

    .lessonTitle::before{
      width:12px;
      height:34px;
      box-shadow:0 0 0 7px rgba(142,165,102,.12);
    }

    .numberPair{
      grid-template-columns:1fr 1fr;
      gap:22px;
    }

    .numberPair label{
      font-size:24px;
      margin-bottom:10px;
    }

    .numberPair input{
      height:72px;
      min-height:72px;
      border-radius:20px;
      font-size:26px;
      padding:0 20px;
    }

    .sticky{
      padding:12px 20px calc(12px + env(safe-area-inset-bottom));
    }

    .stickyInner{
      max-width:860px;
      gap:16px;
    }

    .sticky .btn{
      width:100%;
      height:74px;
      min-height:74px;
      border-radius:24px;
      font-size:26px;
    }

    .sheet{
      max-width:760px;
      border-radius:30px;
    }

    .sheetHeader{
      padding:20px 24px;
    }

    .sheetHeader .t{
      font-size:30px;
    }

    .sheetHeader .btn{
      min-width:110px;
      height:64px;
      min-height:64px;
      font-size:22px;
    }

    .sheetBody{
      padding:24px 28px 30px;
    }

    .sheetBody .q{
      margin-top:28px;
    }

    .hint{
      font-size:18px;
      line-height:1.65;
      margin-top:18px;
    }

    .toast{
      width:min(70vw,620px);
      padding:32px 28px;
      border-radius:30px;
    }

    .toast .msg{
      font-size:36px;
      line-height:1.25;
    }
  }
</style>
</head>

<body>
  <main class="wrap">
    <header class="hero">
      <div class="heroInner">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>

          <div style="min-width:0">
            <h1>夜間班人數回報</h1>
            <p class="sub">6 天 × 每天 2 堂｜回報參加人數與青職人數</p>
          </div>
        </div>

        <div class="chip">
          <span class="chipDot"></span>
          <b id="loadState">載入中</b>
        </div>
      </div>
    </header>

    <section class="card">
      <div class="sectionTitle">
        <div class="sectionTitleText"></div>
        <div class="sectionBadge"></div>
      </div>

      <div class="q">
        <label>年度訓練</label>

        <div class="trainBox">
          <div class="trainText">
            <div class="small">目前設定</div>
            <div id="trainingDisplay" class="big">尚未設定</div>
          </div>

          <button id="btnOpenSheet" class="btn primary" type="button">設定</button>
        </div>
      </div>

      <div class="q">
        <label>天數</label>
        <select id="dayNo">
          <option value="">請選擇</option>
          <option value="第1天">第1天</option>
          <option value="第2天">第2天</option>
          <option value="第3天">第3天</option>
          <option value="第4天">第4天</option>
          <option value="第5天">第5天</option>
          <option value="第6天">第6天</option>
        </select>
      </div>

      <div class="q">
        <label>照顧區</label>
        <select id="careArea"></select>
      </div>

      <div class="q">
        <label>場地</label>
        <select id="venue"></select>
      </div>

      <div class="divider"></div>

      <div class="lessonBlock">
        <div class="lessonTitle">第一堂</div>

        <div class="numberPair">
          <div>
            <label>參加人數</label>
            <input id="s1Total" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="0" />
          </div>

          <div>
            <label>青職人數</label>
            <input id="s1Young" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="0" />
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="lessonBlock">
        <div class="lessonTitle">第二堂</div>

        <div class="numberPair">
          <div>
            <label>參加人數</label>
            <input id="s2Total" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="0" />
          </div>

          <div>
            <label>青職人數</label>
            <input id="s2Young" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="0" />
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="sticky">
    <div class="stickyInner">
      <button id="btnSubmit" class="btn primary" type="button">送出回報</button>
      <button id="btnReset" class="btn" type="button">清空</button>
    </div>
  </div>

  <div id="sheetMask" class="sheetMask" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-label="設定年度訓練">
      <div class="sheetHeader">
        <div class="t">設定年度訓練</div>
        <button id="btnCloseSheet" class="btn" type="button">關閉</button>
      </div>

      <div class="sheetBody">
        <div class="q">
          <label>年份</label>
          <input id="manualYear" type="number" min="2000" max="2100" inputmode="numeric" placeholder="例如：2026" />
        </div>

        <div class="q">
          <label>月份</label>
          <select id="manualMonth">
            <option value="">請選擇</option>
            <option value="7">7</option>
            <option value="12">12</option>
          </select>
        </div>

        <div class="hint">
          說明：年度訓練一旦設定就固定；要重新設定必須輸入密碼。
        </div>

        <div class="modalActions">
          <button id="btnApplyManual" class="btn primary" type="button">套用</button>
          <button id="btnClearTraining" class="btn danger" type="button">清除</button>
        </div>

        <div class="divider"></div>

        <div class="q">
          <div class="lessonTitle">修改密碼</div>

          <label>現有密碼</label>
          <input id="pwdOld" type="password" inputmode="numeric" placeholder="輸入現有密碼" />

          <div class="q">
            <label>新密碼</label>
            <input id="pwdNew" type="password" inputmode="numeric" placeholder="輸入新密碼" />
          </div>

          <div class="q">
            <label>確認新密碼</label>
            <input id="pwdNew2" type="password" inputmode="numeric" placeholder="再輸入一次新密碼" />
          </div>

          <div class="q">
            <button id="btnChangePwd" class="btn primary" type="button" style="width:100%;">確認修改密碼</button>
          </div>

          <div class="hint">
            需先輸入現有密碼才能修改。預設密碼：76236250
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">
    <div class="msg" id="toastMsg"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwrKwInJYtEC66KE9jxm5bbBonn35z8G1j_sUCPniBItciGez2gv1WVdkrMDYoPywzc/exec';

    const $ = (id) => document.getElementById(id);

    let trainingText = '';
    let careAreaToVenues = {};
    let adminPass = '';

    function apiCall(api, params = {}){
      return new Promise((resolve, reject)=>{
        const callbackName =
          '__gas_jsonp_' +
          Date.now().toString(36) +
          '_' +
          Math.random().toString(36).slice(2);

        const url = new URL(API_URL);

        url.searchParams.set('api', api);
        url.searchParams.set('callback', callbackName);

        Object.keys(params || {}).forEach((key)=>{
          const value = params[key];

          if (value === undefined || value === null) return;

          url.searchParams.set(key, String(value));
        });

        const script = document.createElement('script');
        let done = false;

        const timer = setTimeout(()=>{
          cleanup();
          reject(new Error('API 連線逾時'));
        }, 30000);

        function cleanup(){
          if (done) return;
          done = true;

          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = (data)=>{
          cleanup();
          resolve(data);
        };

        script.onerror = ()=>{
          cleanup();
          reject(new Error('API 連線失敗，請確認 GAS 已重新部署為新版'));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function showToast(msg, ok=true){
      const t = $('toast');
      const text = String(msg ?? '');

      $('toastMsg').textContent = text;

      t.classList.remove('ok','bad','show');
      t.classList.add(ok ? 'ok' : 'bad', 'show');

      clearTimeout(showToast._tm);

      showToast._tm = setTimeout(()=>{
        t.classList.remove('show');
      }, 2600);
    }

    function setLoadState(text){
      const el = $('loadState');
      if (el) el.textContent = text;
    }

    function setSelectOptions(selectEl, arr, placeholder='請選擇'){
      selectEl.innerHTML = '';

      const opt0 = document.createElement('option');
      opt0.value = '';
      opt0.textContent = placeholder;
      selectEl.appendChild(opt0);

      (arr || []).forEach(v=>{
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        selectEl.appendChild(o);
      });
    }

    function setTrainingDisplay(){
      $('trainingDisplay').textContent = trainingText || '尚未設定';
    }

    function openSheet(){
      $('sheetMask').classList.add('show');
      $('sheetMask').setAttribute('aria-hidden','false');
    }

    function closeSheet(){
      $('sheetMask').classList.remove('show');
      $('sheetMask').setAttribute('aria-hidden','true');

      adminPass = '';

      $('pwdOld').value = '';
      $('pwdNew').value = '';
      $('pwdNew2').value = '';
    }

    function buildTrainingText(year, month){
      return `${year}年${month}月半年度訓練`;
    }

    function resetForm(){
      $('dayNo').value = '';
      $('careArea').value = '';

      setSelectOptions($('venue'), [], '請先選照顧區');

      $('s1Total').value = '';
      $('s1Young').value = '';
      $('s2Total').value = '';
      $('s2Young').value = '';
    }

    function validateNonNegInt(val, label){
      const s = String(val ?? '').trim();

      if (s === '') return `${label} 不可空白`;
      if (!/^\d+$/.test(s)) return `${label} 必須是非負整數`;

      return '';
    }

    function collectPayload(){
      const payload = {
        trainingText: trainingText,
        dayNo: $('dayNo').value.trim(),
        careArea: $('careArea').value.trim(),
        venue: $('venue').value.trim(),
        s1Total: $('s1Total').value,
        s1Young: $('s1Young').value,
        s2Total: $('s2Total').value,
        s2Young: $('s2Young').value
      };

      if (!payload.trainingText) return {ok:false, msg:'請先設定年度訓練'};
      if (!payload.dayNo) return {ok:false, msg:'請選擇天數'};
      if (!payload.careArea) return {ok:false, msg:'請選擇照顧區'};
      if (!payload.venue) return {ok:false, msg:'請選擇場地'};

      let e = '';

      e = validateNonNegInt(payload.s1Total,'第一堂參加人數');
      if (e) return {ok:false, msg:e};

      e = validateNonNegInt(payload.s1Young,'第一堂青職人數');
      if (e) return {ok:false, msg:e};

      e = validateNonNegInt(payload.s2Total,'第二堂參加人數');
      if (e) return {ok:false, msg:e};

      e = validateNonNegInt(payload.s2Young,'第二堂青職人數');
      if (e) return {ok:false, msg:e};

      return {ok:true, payload};
    }

    function setSubmitting(isSubmitting){
      $('btnSubmit').disabled = isSubmitting;
      $('btnReset').disabled = isSubmitting;
      $('btnOpenSheet').disabled = isSubmitting;

      $('btnCloseSheet').disabled = isSubmitting;
      $('btnApplyManual').disabled = isSubmitting;
      $('btnClearTraining').disabled = isSubmitting;
      $('btnChangePwd').disabled = isSubmitting;

      $('careArea').disabled = isSubmitting;
      $('venue').disabled = isSubmitting;
      $('dayNo').disabled = isSubmitting;
    }

    function updateVenueByCareArea(){
      const care = $('careArea').value.trim();
      const venues = (care && careAreaToVenues && careAreaToVenues[care])
        ? careAreaToVenues[care]
        : [];

      setSelectOptions($('venue'), venues, care ? '請選擇' : '請先選照顧區');

      $('venue').value = '';
    }

    function promptPasswordOnce_(){
      const p = window.prompt('請輸入密碼');

      if (p === null) return '';

      return String(p).trim();
    }

    function init(){
      setLoadState('載入中');

      apiCall('initData')
        .then((res)=>{
          if (!res || !res.ok){
            setLoadState('失敗');
            showToast(res?.message || '初始化失敗', false);
            return;
          }

          trainingText = (res.trainingText || '').trim();
          setTrainingDisplay();

          careAreaToVenues = res.careAreaToVenues || {};

          setSelectOptions($('careArea'), res.careAreas || []);
          setSelectOptions($('venue'), [], '請先選照顧區');

          setLoadState('就緒');
        })
        .catch((err)=>{
          setLoadState('失敗');
          showToast(String(err.message || err), false);
        });
    }

    $('careArea').addEventListener('change', updateVenueByCareArea);

    $('btnOpenSheet').addEventListener('click', ()=>{
      const p = promptPasswordOnce_();

      if (!p) return;

      setSubmitting(true);

      apiCall('verifyPassword', {
        password: p
      })
        .then((res)=>{
          setSubmitting(false);

          if (!res || !res.ok){
            showToast(res?.message || '密碼錯誤', false);
            return;
          }

          adminPass = p;

          const m = (trainingText || '').match(/^(\d{4})年(7|12)月半年度訓練$/);

          $('manualYear').value = m ? m[1] : '';
          $('manualMonth').value = m ? m[2] : '';
          $('pwdOld').value = adminPass;

          openSheet();
          showToast('已進入設定模式', true);
        })
        .catch((err)=>{
          setSubmitting(false);
          showToast(String(err.message || err), false);
        });
    });

    $('btnCloseSheet').addEventListener('click', closeSheet);

    $('sheetMask').addEventListener('click', (e)=>{
      if (e.target === $('sheetMask')) closeSheet();
    });

    $('btnApplyManual').addEventListener('click', ()=>{
      if (!adminPass) return showToast('請先輸入密碼進入設定模式', false);

      const y = String($('manualYear').value || '').trim();
      const m = String($('manualMonth').value || '').trim();

      if (!/^\d{4}$/.test(y)) return showToast('年份請輸入 4 位數，例如 2026', false);
      if (!/^(7|12)$/.test(m)) return showToast('月份請選 7 或 12', false);

      const newText = buildTrainingText(y, m);

      setSubmitting(true);

      apiCall('setTrainingText', {
        trainingText: newText,
        password: adminPass
      })
        .then((res)=>{
          setSubmitting(false);

          if (!res || !res.ok){
            showToast(res?.message || '套用失敗', false);
            return;
          }

          trainingText = (res.trainingText || newText).trim();
          setTrainingDisplay();

          showToast('已套用年度訓練', true);
          closeSheet();
        })
        .catch((err)=>{
          setSubmitting(false);
          showToast(String(err.message || err), false);
        });
    });

    $('btnClearTraining').addEventListener('click', ()=>{
      if (!adminPass) return showToast('請先輸入密碼進入設定模式', false);

      setSubmitting(true);

      apiCall('clearTrainingText', {
        password: adminPass
      })
        .then((res)=>{
          setSubmitting(false);

          if (!res || !res.ok){
            showToast(res?.message || '清除失敗', false);
            return;
          }

          trainingText = '';
          setTrainingDisplay();

          showToast('已清除年度訓練', true);
          closeSheet();
        })
        .catch((err)=>{
          setSubmitting(false);
          showToast(String(err.message || err), false);
        });
    });

    $('btnChangePwd').addEventListener('click', ()=>{
      const oldP = String($('pwdOld').value || '').trim();
      const newP = String($('pwdNew').value || '').trim();
      const newP2 = String($('pwdNew2').value || '').trim();

      if (!oldP) return showToast('請輸入現有密碼', false);
      if (!newP) return showToast('請輸入新密碼', false);
      if (newP !== newP2) return showToast('兩次新密碼不一致', false);
      if (newP.length < 6) return showToast('新密碼至少 6 碼', false);

      setSubmitting(true);

      apiCall('changePassword', {
        oldPassword: oldP,
        newPassword: newP
      })
        .then((res)=>{
          setSubmitting(false);

          if (!res || !res.ok){
            showToast(res?.message || '修改失敗', false);
            return;
          }

          adminPass = newP;

          $('pwdOld').value = newP;
          $('pwdNew').value = '';
          $('pwdNew2').value = '';

          showToast('密碼已修改', true);
        })
        .catch((err)=>{
          setSubmitting(false);
          showToast(String(err.message || err), false);
        });
    });

    $('btnReset').addEventListener('click', ()=>{
      resetForm();
      showToast('已清空', true);
    });

    $('btnSubmit').addEventListener('click', ()=>{
      const v = collectPayload();

      if (!v.ok) return showToast(v.msg, false);

      const payloadSnapshot = {
        trainingText: v.payload.trainingText,
        dayNo: v.payload.dayNo,
        careArea: v.payload.careArea,
        venue: v.payload.venue,
        s1Total: String(v.payload.s1Total || '').trim(),
        s1Young: String(v.payload.s1Young || '').trim(),
        s2Total: String(v.payload.s2Total || '').trim(),
        s2Young: String(v.payload.s2Young || '').trim()
      };

      setSubmitting(true);

      apiCall('submitReport', {
        payload: JSON.stringify(payloadSnapshot)
      })
        .then((res)=>{
          setSubmitting(false);

          if (!res || !res.ok){
            showToast(res?.message || '送出失敗', false);
            return;
          }

          showToast(res.message || '送出成功', true);
          resetForm();
        })
        .catch((err)=>{
          setSubmitting(false);
          showToast(String(err.message || err), false);
        });
    });

    init();
  </script>
</body>
